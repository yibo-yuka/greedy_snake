version: '3.9'

# ── Development docker-compose ────────────────────────────────────────────
# Usage:
#   cp .env.example .env
#   docker-compose up -d
#   docker-compose exec web python manage.py migrate
#   docker-compose exec web python manage.py createsuperuser

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: greedy_snake
      POSTGRES_USER: snake
      POSTGRES_PASSWORD: snakepass_dev_change_in_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snake -d greedy_snake"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: greedy_snake.settings.development
      DATABASE_URL: postgresql://snake:snakepass_dev_change_in_prod@db:5432/greedy_snake
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:8080,http://127.0.0.1:5500,https://yibo-yuka.github.io"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    user: root  # dev only — allows volume write

volumes:
  postgres_data:
